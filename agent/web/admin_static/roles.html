<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pipeline - George Job Agent</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body onload="renderSidebar(); loadRoles();">
    <div class="page-header">
      <div>
        <h1 style="font-size: 2rem; margin: 0;">Pipeline</h1>
        <p class="text-muted" style="margin: 0;">All tracked roles and candidates.</p>
      </div>
      <div class="flex items-center gap-4">
        <label class="flex items-center gap-2" style="margin: 0; cursor: pointer;">
          <input type="checkbox" id="drafts-only" onchange="loadRoles()" style="width: auto;">
          <span>Drafts only</span>
        </label>
        <label class="flex items-center gap-2" style="margin: 0; cursor: pointer;">
          <input type="checkbox" id="include-applied" onchange="loadRoles()" style="width: auto;">
          <span>Include applied</span>
        </label>
      </div>
    </div>

    <div class="glass-card" style="padding: 0; overflow: hidden;">
      <div style="overflow-x: auto;">
        <table id="roles-table-container">
          <thead>
            <tr>
              <th style="width: 60px;">Rank</th>
              <th style="width: 25%;">Company</th>
              <th style="width: 35%;">Role</th>
              <th style="width: 120px;">Score</th>
              <th style="width: 100px;">Tier</th>
              <th>Status</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="roles-table">
            <tr><td colspan="7" class="text-muted text-center" style="padding: 24px; text-align: center;">Loading data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="/admin/layout.js"></script>
    <script src="/admin/app.js"></script>
  </body>
</html>
