<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login - George Job Agent</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body class="login-page">
    <div class="login-card glass-card">
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--accent-primary), transparent); border-radius: var(--radius-md) var(--radius-md) 0 0;"></div>
      
      <p class="eyebrow">Private dashboard</p>
      <h1>George Job Agent</h1>
      <p class="text-muted mb-8" style="font-size: 0.9rem;">Enter your admin token to access the pipeline control center.</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="token">Admin Token</label>
          <div style="position: relative;">
            <input id="token" type="password" autocomplete="current-password" required autofocus placeholder="••••••••••••••••">
            <button type="button" id="toggle-token" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: transparent; border: none; padding: 4px; color: var(--text-muted); cursor: pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="button--primary w-full" id="submit-btn">
          <span>Sign in to Pipeline</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        
        <p id="login-error" class="text-muted mt-4" style="color: var(--status-error); min-height: 1.5em; font-size: 0.85rem;" role="alert"></p>
      </form>
      
      <div class="mt-4 pt-4" style="border-top: 1px solid var(--border-glass);">
        <a href="/" class="text-muted" style="font-size: 0.85rem;">&larr; Back to public profile</a>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "/admin";
      const tokenInput = document.getElementById("token");
      const toggleBtn = document.getElementById("toggle-token");
      
      toggleBtn.addEventListener('click', () => {
        if (tokenInput.type === 'password') {
          tokenInput.type = 'text';
          toggleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path></svg>';
        } else {
          tokenInput.type = 'password';
          toggleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        }
      });

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const submitBtn = document.getElementById("submit-btn");
        const token = tokenInput.value;
        const error = document.getElementById("login-error");
        
        error.textContent = "";
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>Verifying...</span>';
        
        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token })
          });
          
          if (!response.ok) {
            error.textContent = "Invalid admin token.";
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Sign in to Pipeline</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
            return;
          }
          
          window.location.href = next;
        } catch (e) {
          error.textContent = "Connection error.";
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Sign in to Pipeline</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        }
      });
    </script>
  </body>
</html>
