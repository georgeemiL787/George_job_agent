services:
  - type: web
    name: george-job-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    plan: free
    envVars:
      - key: WEB_HOST
        value: 0.0.0.0
      - key: WORKSPACE_DIR
        value: /var/data/workspace
      - key: ENVIRONMENT
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEB_TOKEN
        sync: false
      - key: PUBLIC_EMAIL
        value: george.emil72@gmail.com
      - key: PUBLIC_LINKEDIN
        value: https://www.linkedin.com/in/george-emil/
      - key: PUBLIC_GITHUB
        value: https://github.com/georgeemiL787
